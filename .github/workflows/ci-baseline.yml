name: CI Baseline

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Frontend Install
        working-directory: frontend
        run: npm ci

      - name: Frontend Quality
        working-directory: frontend
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Sync Frontend Dist To Backend
        run: bash scripts/sync_frontend_dist.sh

      - name: Backend Unit Test
        working-directory: backend
        run: mvn -q test

      - name: Backend Start (Test Profile)
        working-directory: backend
        env:
          CALIBER_DB_URL: jdbc:h2:mem:caliber_ci;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          CALIBER_DB_DRIVER: org.h2.Driver
          CALIBER_DB_USERNAME: sa
          CALIBER_DB_PASSWORD: ''
          CALIBER_JWT_SECRET: test-jwt-secret-for-ci-1234567890
          CALIBER_ADMIN_PASSWORD: $2y$10$hg6A0/dS1XzC2XEuDmj3D.izdAKY55ucy1SjAySnMffKUXjr4bri.
          CALIBER_SUPPORT_PASSWORD: $2y$10$3jTJxjRbTcNaTpb2QAmgVeY0SlNaJvRS9KVE6seDZ/hBjEw/5fqIu
          CALIBER_EXPERT_PASSWORD: $2y$10$e31EkcTR483pUsc5PfcaqewquNxI218bmPg07WUsPpkFny9qe4lea
          CALIBER_GOVERNANCE_PASSWORD: $2y$10$rP1YnRbtz4c1fKaMyNw6ou2x0jf1zyBRGCtZqgNg1rOJ8OP0fs99S
          CALIBER_FRONTLINE_PASSWORD: $2y$10$emX7AL6fdJLeRKXmq3AuhOwvTu5ZV9nsDESOagUiTH9NQZMNxHrnC
          CALIBER_COMPLIANCE_PASSWORD: $2y$10$Z4UxpGKVzMripqXXUkc41OizZx7yxsaUDBM9NEsb6SGwm2H4s0TAe
          CALIBER_RATE_LIMIT_ENABLED: 'false'
          CALIBER_CACHE_REDIS_ENABLED: 'false'
          CALIBER_GRAPH_HEALTH_ENABLED: 'false'
        run: |
          nohup env SPRING_PROFILES_ACTIVE=test mvn -q spring-boot:run >/tmp/datadirect-backend-ci.log 2>&1 &
          echo $! >/tmp/datadirect-backend-ci.pid

      - name: Wait Backend And Health Check
        env:
          AUTH_USER: ${{ vars.CALIBER_CI_AUTH_USER || 'admin' }}
          AUTH_PASS: ${{ secrets.CALIBER_CI_AUTH_PASS }}
        run: |
          for i in $(seq 1 40); do
            if [[ -n "${AUTH_PASS}" ]] && curl -fsS -X POST http://127.0.0.1:8082/api/system/auth/token \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"${AUTH_USER}\",\"password\":\"${AUTH_PASS}\"}" >/tmp/auth.json 2>/dev/null; then
              break
            fi
            if curl -fsS http://127.0.0.1:8082/actuator/health >/tmp/health.json 2>/dev/null; then
              break
            fi
            sleep 2
          done
          if [[ -s /tmp/auth.json ]]; then
            jq -e '.accessToken | length > 0' /tmp/auth.json >/dev/null
          fi
          curl -sS http://127.0.0.1:8082/actuator/health | jq -e '.status | type == "string"' >/dev/null

      - name: Dump Backend Log On Failure
        if: failure()
        run: |
          echo "===== backend log ====="
          cat /tmp/datadirect-backend-ci.log || true

      - name: Stop Backend
        if: always()
        run: |
          if [ -f /tmp/datadirect-backend-ci.pid ]; then
            kill "$(cat /tmp/datadirect-backend-ci.pid)" || true
          fi
