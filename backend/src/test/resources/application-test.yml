spring:
  datasource:
    url: jdbc:h2:mem:caliber_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

caliber:
  security:
    enabled: true
    jwt-secret: test-jwt-secret-for-ut-1234567890
    require-write-auth: true
    rate-limit-enabled: false
    users:
      - username: admin
        password: admin123
        roles: [ADMIN, SUPPORT]
      - username: support
        password: support123
        roles: [SUPPORT]
      - username: expert
        password: expert123
        roles: [EXPERT]
      - username: governance
        password: governance123
        roles: [GOVERNANCE]
      - username: frontline
        password: frontline123
        roles: [FRONTLINE]
      - username: compliance
        password: compliance123
        roles: [COMPLIANCE]
  llm:
    preprocess:
      secret-key: test-llm-secret-for-ut-1234567890
