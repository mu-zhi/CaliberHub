server:
  port: 8080

spring:
  application:
    name: caliberhub
  
  datasource:
    url: jdbc:sqlite:./caliberhub.db
    driver-class-name: org.sqlite.JDBC
  
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

logging:
  level:
    com.caliberhub: DEBUG
    org.hibernate.SQL: DEBUG
