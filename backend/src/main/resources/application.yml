spring:
  application:
    name: caliber-mvp-backend
  datasource:
    url: ${CALIBER_DB_URL:jdbc:mysql://127.0.0.1:3306/caliber?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    driver-class-name: ${CALIBER_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${CALIBER_DB_USERNAME:caliber}
    password: ${CALIBER_DB_PASSWORD:caliber}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${CALIBER_REDIS_HOST:127.0.0.1}
      port: ${CALIBER_REDIS_PORT:6379}
      timeout: 2s

server:
  port: 8082

info:
  app:
    name: 数据直通车
    version: ${DD_APP_VERSION:0.1.0}
    build-time: ${DD_APP_BUILD_TIME:unknown}
  frontend:
    dist-version: ${DD_FRONTEND_DIST_VERSION:unknown}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-} %X{userId:-} %X{role:-} %X{api:-} %X{status:-} %X{errorCode:-}] %logger{36} - %msg%n"

caliber:
  security:
    enabled: ${CALIBER_SECURITY_ENABLED:false}
    jwt-secret: ${CALIBER_JWT_SECRET:}
    token-expire-minutes: ${CALIBER_JWT_EXPIRE_MINUTES:480}
    require-write-auth: ${CALIBER_REQUIRE_WRITE_AUTH:false}
    rate-limit-enabled: ${CALIBER_RATE_LIMIT_ENABLED:true}
    write-per-minute: ${CALIBER_WRITE_RATE_LIMIT:120}
    llm-per-minute: ${CALIBER_LLM_RATE_LIMIT:30}
    users:
      - username: admin
        password: ${CALIBER_ADMIN_PASSWORD:}
        roles: [ADMIN, SUPPORT]
      - username: support
        password: ${CALIBER_SUPPORT_PASSWORD:}
        roles: [SUPPORT]
      - username: expert
        password: ${CALIBER_EXPERT_PASSWORD:}
        roles: [EXPERT]
      - username: governance
        password: ${CALIBER_GOVERNANCE_PASSWORD:}
        roles: [GOVERNANCE]
      - username: frontline
        password: ${CALIBER_FRONTLINE_PASSWORD:}
        roles: [FRONTLINE]
      - username: compliance
        password: ${CALIBER_COMPLIANCE_PASSWORD:}
        roles: [COMPLIANCE]
  cache:
    redis-enabled: ${CALIBER_CACHE_REDIS_ENABLED:false}
    ttl-seconds: ${CALIBER_CACHE_TTL_SECONDS:300}
  llm:
    preprocess:
      enabled: true
      endpoint: "${CALIBER_LLM_ENDPOINT:https://coding.dashscope.aliyuncs.com/v1/chat/completions}"
      api-key: "${CALIBER_LLM_API_KEY:}"
      model: "qwen3-max"
      timeout-seconds: 35
      temperature: 0.0
      max-tokens: 4096
      enable-thinking: false
      fallback-to-rule: true
      rate-limit-per-minute: 30
      circuit-breaker-failure-threshold: 5
      circuit-breaker-open-seconds: 60
      secret-key: ${CALIBER_LLM_SECRET_KEY:caliber-local-llm-secret}
  graph-runtime:
    projection-enabled: ${CALIBER_GRAPH_PROJECTION_ENABLED:false}
    read-enabled: ${CALIBER_GRAPH_READ_ENABLED:false}
    vector-enabled: ${CALIBER_GRAPH_VECTOR_ENABLED:false}
    rebuild-enabled: ${CALIBER_GRAPH_REBUILD_ENABLED:true}
    neo4j-uri: ${CALIBER_NEO4J_URI:bolt://127.0.0.1:7687}
    neo4j-username: ${CALIBER_NEO4J_USERNAME:neo4j}
    neo4j-password: ${CALIBER_NEO4J_PASSWORD:neo4j}
    neo4j-database: ${CALIBER_NEO4J_DATABASE:neo4j}
    embedding-provider: ${CALIBER_GRAPH_EMBEDDING_PROVIDER:HASH}
    embedding-model: ${CALIBER_GRAPH_EMBEDDING_MODEL:hash-bow-v1}
    embedding-dimension: ${CALIBER_GRAPH_EMBEDDING_DIMENSION:32}
