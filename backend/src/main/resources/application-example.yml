server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./caliberhub.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.caliberhub: INFO
    org.hibernate.SQL: WARN

# 运行示例数据: 启动时添加 --spring.profiles.active=seed
